set -g mouse on
set -sg escape-time 10

##### =========================
##### TERMINAL FIXES
##### =========================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

##### =========================
##### GRUVBOX STATUS BAR THEME
##### =========================

# Gruvbox colors (dark)
set -g status-style bg=#282828,fg=#ebdbb2

# Session name (left)
set -g status-left "#[fg=#fabd2f,bold]  #S #[default]"

# Clock (right)
set -g status-right "#[fg=#a89984]%d-%m-%Y %H:%M #[default]"
set -g status-right-length 50

# Window list (inactive)
set -g window-status-format " #[fg=#a89984]#I:#W "

# Window list (active)
set -g window-status-current-format " #[fg=#282828,bg=#fabd2f,bold] #I:#W #[default]"

set -g window-status-separator " "

##### =========================
##### INDEXING (1-based)
##### =========================
set -g base-index 1
set -g pane-base-index 1

##### =========================
##### AUTO WINDOW NAMING
##### =========================
setw -g automatic-rename on
setw -g automatic-rename-format '#{pane_current_command}'

##### =========================
##### STATUS POSITION
##### =========================
set -g status-position top

##### =========================
##### STATUS RIGHT (duplicate fix removed)
##### =========================
# (Removed duplicate "TMUX" override and earlier conflicting status-right)

##### =========================
##### STATUS LEFT (clean session display)
##### =========================
set -g status-left '  #S'

##### =========================
##### SPLITS
##### =========================
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

##### =========================
##### VIM-STYLE NAVIGATION
##### =========================
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

##### =========================
##### PLUGINS
##### =========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jaclu/tmux-menus'

# Initialize TMUX plugin manager (keep this at bottom)
run '~/.tmux/plugins/tpm/tpm'
