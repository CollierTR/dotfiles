set -g mouse on
set -sg escape-time 10

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
bind-key , command-prompt -I "#W" "rename-window '%%'; setw automatic-rename off"

##### =========================
##### TERMINAL FIXES
##### =========================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

##### =========================
##### GRUVBOX STATUS BAR THEME
##### =========================

set -g status-position top
set -g status-left-length 40
set -g status-right-length 40

# Gruvbox colors (dark)
set -g status-style bg=#282828,fg=#ebdbb2

set -g status-justify centre

# Window list (inactive)
set -g window-status-format " #[fg=#a89984]#I:#W "

# Window list (active)
set -g window-status-current-format " #[fg=#282828,bg=#fabd2f,bold] #I:#W #[default] "

# Session name (left)
set -g status-left "#[fg=#fabd2f,bold]  #S #[default]"

# Clock (right)
set -g status-right "#[fg=#a89984]%d-%m-%Y %H:%M #[default]"
set -g status-right-length 50



##### =========================
##### INDEXING (1-based)
##### =========================
set -g base-index 1
set -g pane-base-index 1

##### =========================
##### AUTO WINDOW NAMING
##### =========================
setw -g automatic-rename on
##setw -g automatic-rename-format '#{pane_current_command}'
set -g automatic-rename-format ' #{pane_current_command} '

##### =========================
##### STATUS POSITION
##### =========================
set -g status-position top

##### =========================
##### STATUS LEFT (clean session display)
##### =========================
set -g status-left '  #S'

##### =========================
##### SPLITS AND WINDOWS
##### =========================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind c new-window -c "#{pane_current_path}"

##### =========================
##### VIM-STYLE NAVIGATION
##### =========================
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

##### =========================
##### PERSISTENT RENAMING
##### =========================
bind-key , command-prompt -I "#W" "rename-window '%%'; setw automatic-rename off"

##### =========================
##### PLUGINS
##### =========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jaclu/tmux-menus'

# Initialize TMUX plugin manager (keep this at bottom)
run '~/.tmux/plugins/tpm/tpm'
